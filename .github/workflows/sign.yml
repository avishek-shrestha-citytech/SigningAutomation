name: Cloud Signer Pro
on:
  # This listens for the "Instant Trigger" from your Google Apps Script
  repository_dispatch:
    types: [manual_trigger]
  # This allows you to trigger manually from the GitHub Actions tab
  workflow_dispatch:
    inputs:
      apk_url:
        description: 'Google Drive File ID'
        required: true
      file_name:
        description: 'Original File Name'
        required: true
      folder_id:
        description: 'Drive Folder ID'
        required: true

jobs:
  sign:
    runs-on: ubuntu-latest
    permissions:
      contents: write
  
    env:
      APPS_SCRIPT_URL: "https://script.google.com/macros/s/AKfycby3KkmaAnSnJrlBBzGlIy02shG1KOgAjTB_gCjPYdSishUO8jjqMoGrTjMgjvQF91sl/exec"

    steps:
      - name: 🔍 Checkout Repository
        uses: actions/checkout@v4

      - name: 📥 Setup Environment Variables
        run: |
          if [ "${{ github.event_name }}" == "repository_dispatch" ]; then
            echo "APK_ID=${{ github.event.client_payload.apk_url }}" >> $GITHUB_ENV
            echo "FILE_NAME=${{ github.event.client_payload.file_name }}" >> $GITHUB_ENV
            echo "FOLDER_ID=${{ github.event.client_payload.folder_id }}" >> $GITHUB_ENV
          else
            echo "APK_ID=${{ github.event.inputs.apk_url }}" >> $GITHUB_ENV
            echo "FILE_NAME=${{ github.event.inputs.file_name }}" >> $GITHUB_ENV
            echo "FOLDER_ID=${{ github.event.inputs.folder_id }}" >> $GITHUB_ENV
          fi

      - name: 📥 Download APK from Drive
        run: |
          pip install gdown --quiet
          gdown "https://drive.google.com/uc?id=${{ env.APK_ID }}" -O input.apk --fuzzy
          
          if [ $(stat -c%s "input.apk") -lt 10000 ]; then
            echo "❌ Download failed or file is too small."
            exit 1
          fi

      - name: ✍️ Sign APK (Official Android apksigner)
        run: |
          # Install apksigner for V2/V3 Signature support
          sudo apt-get update && sudo apt-get install -y apksigner
          
          # Clean name: remove "processing_" and add "_signed"
          RAW_NAME="${{ env.FILE_NAME }}"
          CLEAN_NAME=$(echo "$RAW_NAME" | sed 's/^processing_//')
          SIGNED_NAME="${CLEAN_NAME%.apk}_signed.apk"
          
          # Sign using your root certs (citytech.x509.pem and citytech.pk8)
          apksigner sign --key citytech.pk8 --cert citytech.x509.pem --out "$SIGNED_NAME" input.apk
          
          # Verify the signature immediately
          apksigner verify "$SIGNED_NAME"
          
          echo "SIGNED_NAME=$SIGNED_NAME" >> $GITHUB_ENV
          echo "✅ Signed Successfully: $SIGNED_NAME"

      - name: 📤 Upload Signed APK to Drive
        run: |
          pip install google-auth google-auth-httplib2 google-api-python-client --quiet
          python3 - <<'EOF'
          import os, json
          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          sa_json = os.environ["GDRIVE_SERVICE_ACCOUNT"]
          folder_id = os.environ["FOLDER_ID"]
          file_name = os.environ["SIGNED_NAME"]

          creds = service_account.Credentials.from_service_account_info(
              json.loads(sa_json),
              scopes=["https://www.googleapis.com/auth/drive"]
          )
          service = build("drive", "v3", credentials=creds)

          file_metadata = {
              "name": file_name,
              "parents": [folder_id]
          }
          media = MediaFileUpload(
              file_name,
              mimetype="application/vnd.android.package-archive",
              resumable=True
          )
          uploaded = service.files().create(
              body=file_metadata,
              media_body=media,
              fields="id, name",
              supportsAllDrives=True
          ).execute()
          print(f"✅ Uploaded: {uploaded.get('name')} (id: {uploaded.get('id')})")
          EOF
        env:
          GDRIVE_SERVICE_ACCOUNT: ${{ secrets.GDRIVE_SERVICE_ACCOUNT }}
          FOLDER_ID: ${{ env.FOLDER_ID }}
          SIGNED_NAME: ${{ env.SIGNED_NAME }}

      - name: 🧹 Cleanup Processing File (Google Drive)
        if: always()
        run: |
          # Pings your Apps Script to delete the "processing_" file
          curl -L "${{ env.APPS_SCRIPT_URL }}?folderId=${{ env.FOLDER_ID }}"
