name: Cloud Signer Pro
on:
  workflow_dispatch:
    inputs:
      apk_url:
        description: 'GitHub Release Asset URL'
        required: true
      file_name:
        description: 'Original File Name'
        required: true
      release_id:
        description: 'GitHub Release ID'
        required: true

jobs:
  sign:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write

    steps:
      - name: 📦 Checkout Repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: 🛡️ Validate Inputs
        run: |
          printf '%s' "$FILE_NAME" | grep -qE '^[a-zA-Z0-9._-]+\.apk$' || { echo "❌ Invalid filename"; exit 1; }
          printf '%s' "$RELEASE_ID" | grep -qE '^[0-9]+$' || { echo "❌ Invalid release ID"; exit 1; }
        env:
          FILE_NAME: ${{ github.event.inputs.file_name }}
          RELEASE_ID: ${{ github.event.inputs.release_id }}

      - name: 📥 Download APK from Release
        run: |
          # Validate URL is from GitHub releases API only
          if ! echo "$APK_URL" | grep -qE "^https://api\.github\.com/repos/avishek-shrestha-citytech/SigningAutomation/releases/assets/[0-9]+$"; then
            echo "❌ Invalid APK URL - must be from GitHub releases"
            exit 1
          fi

          curl -L -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/octet-stream" \
            "$APK_URL" -o input.apk

          if [ $(stat -c%s "input.apk") -lt 10000 ]; then
            echo "❌ Download failed or file too small"
            exit 1
          fi
        env:
          APK_URL: ${{ github.event.inputs.apk_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔑 Decode Signing Keys
        run: |
          echo "$SIGNING_KEY" | base64 -d > /dev/shm/citytech.pk8
          echo "$SIGNING_CERT" | base64 -d > /dev/shm/citytech.x509.pem
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_CERT: ${{ secrets.SIGNING_CERT }}

      - name: 🔐 Verify signapk.jar integrity
        run: |
          EXPECTED="179fa231a584a0bb394d53156738e3e3b842ef326eb660b80a286f94553ec5be"
          ACTUAL=$(sha256sum signapk.jar | awk '{print $1}')
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "❌ signapk.jar integrity check FAILED — aborting!"
            exit 1
          fi
          echo "✅ signapk.jar integrity verified"

      - name: ✍️ Sign APK
        run: |
          CLEAN_NAME=$(printf '%s\n' "$FILE_NAME" | sed 's/^processing_//')
          SIGNED_NAME="${CLEAN_NAME%.apk}_wpos_signed.apk"

          java -jar signapk.jar /dev/shm/citytech.x509.pem /dev/shm/citytech.pk8 input.apk "$SIGNED_NAME"

          echo "SIGNED_NAME=$SIGNED_NAME" >> $GITHUB_ENV
        env:
          FILE_NAME: ${{ github.event.inputs.file_name }}

      - name: 🧹 Shred Keys
        if: always()
        run: |
          shred -u /dev/shm/citytech.pk8 /dev/shm/citytech.x509.pem 2>/dev/null || true

      - name: 📤 Upload Signed APK to Release
        run: |
          curl -L \
            -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Content-Type: application/vnd.android.package-archive" \
            --data-binary @"$SIGNED_NAME" \
            "https://uploads.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID/assets?name=$SIGNED_NAME"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ github.event.inputs.release_id }}
          SIGNED_NAME: ${{ env.SIGNED_NAME }}
