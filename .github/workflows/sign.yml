name: Cloud Signer Pro
on:
  workflow_dispatch:
    inputs:
      apk_url:
        description: 'GitHub Release Asset URL'
        required: true
      file_name:
        description: 'Original File Name'
        required: true
      release_id:
        description: 'GitHub Release ID'
        required: true

jobs:
  sign:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Download APK from Release
        run: |
          # Validate URL is from GitHub releases API only
          if ! echo "${{ github.event.inputs.apk_url }}" | grep -qE "^https://api\.github\.com/repos/avishek-shrestha-citytech/SigningAutomation/releases/assets/[0-9]+$"; then
            echo "❌ Invalid APK URL - must be from GitHub releases"
            exit 1
          fi

          curl -L -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/octet-stream" \
            "${{ github.event.inputs.apk_url }}" -o input.apk

          if [ $(stat -c%s "input.apk") -lt 10000 ]; then
            echo "❌ Download failed or file too small"
            exit 1
          fi

      - name: 🔑 Decode Signing Keys
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 -d > citytech.pk8
          echo "${{ secrets.SIGNING_CERT }}" | base64 -d > citytech.x509.pem

      - name: ✍️ Sign APK
        run: |
          which apksigner > /dev/null || (sudo apt-get update && sudo apt-get install -y apksigner)

          # Use environment variable to avoid shell injection
          CLEAN_NAME=$(printf '%s\n' "$FILE_NAME" | sed 's/^processing_//')
          SIGNED_NAME="${CLEAN_NAME%.apk}_signed.apk"

          apksigner sign --key citytech.pk8 --cert citytech.x509.pem \
            --out "$SIGNED_NAME" input.apk
          apksigner verify "$SIGNED_NAME"

          echo "SIGNED_NAME=$SIGNED_NAME" >> $GITHUB_ENV
        env:
          FILE_NAME: ${{ github.event.inputs.file_name }}

      - name: 🧹 Shred Keys
        if: always()
        run: |
          # Shred keys from memory. Note: GitHub Actions runners are ephemeral VMs destroyed after each job,
          # so the actual security comes from VM destruction, not shred. However, shred is a defense-in-depth measure
          # in case the runner environment changes in the future.
          shred -u citytech.pk8 citytech.x509.pem

      - name: 📤 Upload Signed APK to Release
        run: |
          curl -L \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/vnd.android.package-archive" \
            --data-binary @"${{ env.SIGNED_NAME }}" \
            "https://uploads.github.com/repos/${{ github.repository }}/releases/${{ github.event.inputs.release_id }}/assets?name=${{ env.SIGNED_NAME }}"
