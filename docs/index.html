<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APK Signer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #0d1117; color: #e6edf3;
           display: flex; justify-content: center; align-items: center;
           min-height: 100vh; }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px;
            padding: 40px; width: 100%; max-width: 500px; text-align: center; }
    h1 { font-size: 1.5rem; margin-bottom: 8px; }
    p { color: #8b949e; margin-bottom: 24px; }
    .drop-zone { border: 2px dashed #30363d; border-radius: 8px; padding: 48px 24px;
                 cursor: pointer; transition: all 0.2s; }
    .drop-zone.dragover { border-color: #58a6ff; background: #1f2937; }
    .drop-zone input { display: none; }
    .status { margin-top: 24px; padding: 16px; border-radius: 8px;
              background: #1f2937; display: none; }
    .status.visible { display: block; }
    .download-btn { margin-top: 16px; padding: 12px 24px; background: #238636;
                    color: white; border-radius: 6px; text-decoration: none;
                    font-weight: 600; display: none; }
    .download-btn.visible { display: inline-block; }
    .spinner { display: inline-block; width: 16px; height: 16px;
               border: 2px solid #58a6ff; border-top-color: transparent;
               border-radius: 50%; animation: spin 0.8s linear infinite;
               vertical-align: middle; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <h1>⚙️ APK Signer</h1>
    <p>Drop your APK below to sign it</p>

    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".apk">
      <div id="dropText">📦 Drag & drop your APK here<br><small>or click to browse</small></div>
    </div>

    <div class="status" id="status"></div>
    <a class="download-btn" id="downloadBtn">⬇️ Download Signed APK</a>
  </div>

  <script>
    const GITHUB_TOKEN = "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";
    const REPO_OWNER = "avishek-shrestha-citytech";
    const REPO_NAME = "SigningAutomation";
    const WORKFLOW_FILE = "sign.yml";
    const WORKER_URL = "https://apk-upload-proxy.abhishrestha987.workers.dev";

    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const status = document.getElementById('status');
    const downloadBtn = document.getElementById('downloadBtn');

    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      handleFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', () => handleFile(fileInput.files[0]));

    async function handleFile(file) {
      if (!file || !file.name.endsWith('.apk')) {
        showStatus('❌ Please select a valid .apk file');
        return;
      }

      downloadBtn.classList.remove('visible');

      try {
        showStatus('<span class="spinner"></span> Creating release...');

        // 1. Create draft release
        const release = await ghFetch(
          `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/releases`,
          'POST',
          { tag_name: `signing-${Date.now()}`, name: 'Signing Job', draft: true }
        );

        if (!release.id) throw new Error('Failed to create release: ' + JSON.stringify(release));

        showStatus(`<span class="spinner"></span> Uploading APK (${(file.size / 1024 / 1024).toFixed(1)} MB)...`);

        // 2. Upload APK via Cloudflare Worker proxy
        const asset = await fetch(
          `${WORKER_URL}?release_id=${release.id}&file_name=${encodeURIComponent(file.name)}`,
          {
            method: 'POST',
            body: file
          }
        ).then(r => r.json());

        if (!asset.id) throw new Error('Asset upload failed: ' + JSON.stringify(asset));

        showStatus('<span class="spinner"></span> Triggering signing workflow...');

        // 3. Trigger workflow
        await ghFetch(
          `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/actions/workflows/${WORKFLOW_FILE}/dispatches`,
          'POST',
          {
            ref: 'main',
            inputs: {
              apk_url: asset.url,
              file_name: file.name,
              release_id: String(release.id)
            }
          }
        );

        showStatus('<span class="spinner"></span> Signing in progress — this takes ~60 seconds...');

        // 4. Poll for signed APK
        await pollForResult(release.id, file.name);

      } catch (err) {
        showStatus('❌ Error: ' + err.message);
      }
    }

    async function pollForResult(releaseId, originalName) {
      const signedName = originalName.replace(/\.apk$/i, '_signed.apk');
      const maxAttempts = 60;
      let attempts = 0;

      return new Promise((resolve, reject) => {
        const interval = setInterval(async () => {
          attempts++;

          if (attempts > maxAttempts) {
            clearInterval(interval);
            reject(new Error('Timed out after 3 minutes. Check GitHub Actions for errors.'));
            return;
          }

          try {
            const assets = await ghFetch(
              `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/releases/${releaseId}/assets`
            );

            const signed = assets.find(a => a.name === signedName);
            if (signed) {
              clearInterval(interval);
              showStatus('✅ Signing complete!');
              downloadBtn.href = signed.browser_download_url;
              downloadBtn.download = signedName;
              downloadBtn.classList.add('visible');
              resolve();
            }
          } catch (e) {
            // keep polling
          }
        }, 3000);
      });
    }

    function ghFetch(url, method = 'GET', body = null) {
      const opts = {
        method,
        headers: {
          Authorization: `Bearer ${GITHUB_TOKEN}`,
          'Content-Type': 'application/json',
          Accept: 'application/vnd.github+json'
        }
      };
      if (body) opts.body = JSON.stringify(body);
      return fetch(url, opts).then(r => r.json());
    }

    function showStatus(msg) {
      status.innerHTML = msg;
      status.className = 'status visible';
    }
  </script>
</body>
</html>
