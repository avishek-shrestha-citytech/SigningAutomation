<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Citytech APK Signing Service</title>
  <link rel="icon" type="image/x-icon" href="CityTech.ico">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
      background: #f8fafc;
      color: #1e293b;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .main {
      flex: 1;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      padding: 80px 40px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 100px;
      align-items: center;
    }

    /* Left Section */
    .left-section {
      text-align: left;
    }

    .logo-section {
      margin-bottom: 60px;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .logo-icon {
      font-size: 6.5rem;
      width: 140px;
      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-img {
      width: 140px;
      height: 140px;
    }

    .logo-text h2 {
      font-size: 4rem;
      font-weight: 800;
      color: #0369a1;
      margin: 0;
      line-height: 1;
    }

    .logo-text p {
      font-size: 1.2rem;
      color: #64748b;
      margin: 8px 0 0 0;
      font-weight: 500;
    }

    .left-section h1 {
      font-size: 4.2rem;
      font-weight: 800;
      margin-bottom: 20px;
      color: #0f172a;
      line-height: 1.2;
    }

    .left-section p {
      font-size: 1.3rem;
      color: #64748b;
      line-height: 1.6;
      max-width: 450px;
    }

    /* Right Section */
    .right-section {
      display: flex;
      flex-direction: column;
    }

    /* ===== LOCK SCREEN ===== */
    .lock-card {
      background: white;
      border-radius: 24px;
      border: 1px solid #e2e8f0;
      padding: 60px 50px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.06);
      transition: all 0.4s ease;
      text-align: center;
    }

    .lock-card:hover {
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.1);
      border-color: #bae6fd;
    }

    .lock-icon {
      font-size: 4rem;
      margin-bottom: 16px;
      display: block;
    }

    .lock-card h2 {
      font-size: 1.8rem;
      color: #0f172a;
      margin-bottom: 8px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .lock-card .lock-subtitle {
      color: #94a3b8;
      font-size: 0.95rem;
      margin-bottom: 32px;
      font-weight: 500;
    }

    .passcode-group {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }

    .passcode-input {
      flex: 1;
      padding: 16px 20px;
      border: 2px solid #e2e8f0;
      border-radius: 14px;
      font-size: 1.05rem;
      outline: none;
      transition: all 0.3s;
      color: #0f172a;
      background: #f8fafc;
    }

    .passcode-input:focus {
      border-color: #0369a1;
      box-shadow: 0 0 0 3px rgba(3, 105, 161, 0.1);
      background: white;
    }

    .passcode-input.error {
      border-color: #ef4444;
      box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1);
      animation: shake 0.5s ease;
    }

    .unlock-btn {
      padding: 16px 28px;
      background: linear-gradient(135deg, #0369a1 0%, #0284c7 100%);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 14px rgba(3, 105, 161, 0.3);
      white-space: nowrap;
    }

    .unlock-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(3, 105, 161, 0.4);
    }

    .unlock-btn:active {
      transform: translateY(0);
    }

    .unlock-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .lock-error-msg {
      color: #ef4444;
      font-size: 0.9rem;
      font-weight: 600;
      min-height: 22px;
      transition: opacity 0.3s;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-6px); }
      20%, 40%, 60%, 80% { transform: translateX(6px); }
    }

    /* Fade out animation for lock screen */
    .lock-card.unlocked {
      opacity: 0;
      transform: scale(0.95) translateY(-10px);
      pointer-events: none;
    }

    /* ===== UPLOAD CARD ===== */
    .upload-card {
      background: white;
      border-radius: 24px;
      border: 1px solid #e2e8f0;
      padding: 80px 50px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.06);
      transition: all 0.3s ease;
      animation: fadeInUp 0.5s ease;
    }

    .upload-card:hover {
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.1);
      border-color: #bae6fd;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.97);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .card-header {
      margin-bottom: 50px;
      text-align: center;
    }

    .card-header h2 {
      font-size: 2rem;
      color: #0f172a;
      margin-bottom: 10px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .card-header p {
      color: #64748b;
      font-size: 0.95rem;
      font-weight: 500;
    }

    .drop-zone {
      border: 2.5px dashed #cbd5e1;
      border-radius: 20px;
      padding: 80px 40px;
      cursor: pointer;
      transition: all 0.3s ease;
      background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
      margin-bottom: 36px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .drop-zone::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at top right, rgba(3, 105, 161, 0.02), transparent);
      pointer-events: none;
    }

    .drop-zone:hover {
      border-color: #0369a1;
      background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
    }

    .drop-zone.dragover {
      border-color: #0284c7;
      background: linear-gradient(135deg, #e0f2fe 0%, #cffafe 100%);
      transform: scale(1.02);
      box-shadow: 0 10px 30px rgba(3, 105, 161, 0.15);
    }

    .drop-zone input {
      display: none;
    }

    .drop-icon {
      font-size: 4rem;
      display: block;
      margin-bottom: 20px;
      transition: transform 0.3s;
      position: relative;
      z-index: 1;
    }

    .drop-zone:hover .drop-icon {
      transform: scale(1.2) translateY(-4px);
    }

    .drop-text {
      color: #0f172a;
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 8px;
      position: relative;
      z-index: 1;
      letter-spacing: -0.3px;
    }

    .drop-hint {
      color: #94a3b8;
      font-size: 0.95rem;
      margin: 0;
      position: relative;
      z-index: 1;
      font-weight: 500;
    }

    .file-info {
      display: none;
      margin-top: 18px;
      padding: 14px;
      background: #e0f2fe;
      border-radius: 10px;
      color: #0369a1;
      font-size: 0.9rem;
      border: 1px solid #bae6fd;
      font-weight: 500;
    }

    .file-info.visible {
      display: block;
    }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: #e2e8f0;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 28px;
      display: none;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08) inset;
    }

    .progress-bar.visible {
      display: block;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #0369a1, #0284c7);
      width: 0%;
      border-radius: 4px;
      box-shadow: 0 0 10px rgba(3, 105, 161, 0.5);
      transition: width 0.3s ease;
    }

    .progress-text {
      text-align: center;
      font-size: 0.9rem;
      color: #0369a1;
      font-weight: 600;
      margin-top: 8px;
      display: none;
    }

    .progress-text.visible {
      display: block;
    }

    /* STEPPER UI */
    .stepper {
      display: none;
      flex-direction: row;
      justify-content: space-between;
      margin-bottom: 30px;
      margin-top: 10px;
      position: relative;
    }

    .stepper.visible {
      display: flex;
    }

    .stepper::before {
      content: '';
      position: absolute;
      top: 15px;
      left: 35px;
      right: 35px;
      height: 2px;
      background: #e2e8f0;
      z-index: 0;
    }

    .step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: #94a3b8;
      font-weight: 600;
      font-size: 0.85rem;
      z-index: 1;
      width: 60px;
      text-align: center;
    }

    .step-icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 2px solid #e2e8f0;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      transition: all 0.3s;
    }

    .step.active {
      color: #0369a1;
    }

    .step.active .step-icon {
      border-color: #0369a1;
      background: #e0f2fe;
      color: #0369a1;
      box-shadow: 0 0 0 4px rgba(3, 105, 161, 0.1);
    }

    .step.completed {
      color: #10b981;
    }

    .step.completed .step-icon {
      border-color: #10b981;
      background: #10b981;
      color: white;
      font-size: 1.1rem;
    }

    .step.error {
      color: #ef4444;
    }

    .step.error .step-icon {
      border-color: #ef4444;
      background: #fee2e2;
      color: #ef4444;
      font-size: 1.1rem;
      box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.1);
    }

    .spinner-small {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(3, 105, 161, 0.2);
      border-top-color: #0369a1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    /* END STEPPER UI */

    .status {
      margin-bottom: 24px;
      padding: 16px;
      border-radius: 12px;
      background: #f1f5f9;
      display: none;
      min-height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      font-size: 0.95rem;
      line-height: 1.4;
      animation: slideIn 0.3s ease;
      text-align: center;
    }

    .status.visible {
      display: flex;
    }

    .status.error {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }

    .status.success {
      background: #dcfce7;
      color: #166534;
      border: 1px solid #bbf7d0;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 3px solid rgba(3, 105, 161, 0.2);
      border-top-color: #0369a1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .download-btn {
      display: none;
      width: 100%;
      padding: 18px 32px;
      background: linear-gradient(135deg, #0369a1 0%, #0284c7 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s ease;
      box-shadow: 0 6px 20px rgba(3, 105, 161, 0.35);
      letter-spacing: -0.3px;
    }

    .download-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(3, 105, 161, 0.45);
    }

    .download-btn:active {
      transform: translateY(-1px);
    }

    .download-btn.visible {
      display: block;
    }

    /* Footer */
    footer {
      background: white;
      border-top: 1px solid #e2e8f0;
      padding: 32px 40px;
      text-align: center;
      color: #64748b;
      font-size: 0.9rem;
    }

    .credit {
      color: #94a3b8;
      font-size: 0.85rem;
    }

    /* Responsive */
    @media (max-width: 900px) {
      .main {
        grid-template-columns: 1fr;
        gap: 60px;
        padding: 60px 30px;
      }

      .left-section h1 {
        font-size: 2.5rem;
      }

      .upload-card, .lock-card {
        padding: 40px 30px;
      }

      .logo-section {
        margin-bottom: 40px;
      }
    }

    @media (max-width: 600px) {
      .main {
        padding: 40px 20px;
        gap: 40px;
      }

      .left-section h1 {
        font-size: 1.8rem;
      }

      .left-section p {
        font-size: 1rem;
      }

      .upload-card, .lock-card {
        padding: 32px 20px;
      }

      .drop-zone {
        padding: 40px 20px;
      }

      .logo-section {
        gap: 16px;
      }

      .logo-text h2 {
        font-size: 2.8rem;
      }

      .logo-img {
        width: 100px;
        height: 100px;
      }

      .passcode-group {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <div class="main">
    <div class="left-section">
      <div class="logo-section">
        <img src="CityTech.ico" alt="CityTech" class="logo-img">
        <div class="logo-text">
          <h2>Citytech</h2>
          <p>APK Signing Service</p>
        </div>
      </div>
    </div>

    <div class="right-section" id="rightSection">
      <!-- LOCK SCREEN: This is all that exists in the DOM initially -->
      <div class="lock-card" id="lockScreen">
        <span class="lock-icon">🔒</span>
        <h2>Authorized Access Only</h2>
        <p class="lock-subtitle">Enter your organization passcode to continue</p>
        <div class="passcode-group">
          <input type="password" id="passcodeInput" class="passcode-input" placeholder="Enter Passcode" autocomplete="off">
          <button class="unlock-btn" id="unlockBtn" onclick="window.__unlock()">Unlock</button>
        </div>
        <div class="lock-error-msg" id="lockError"></div>
      </div>
      <!-- NO upload UI exists here. It is injected dynamically after authentication. -->
    </div>
  </div>

  <footer>
    <span class="credit">By Avishek Shrestha | CityTech</span>
  </footer>

  <script>
    // ============================================================
    // SECURITY: Everything runs inside an IIFE closure.
    // The passcode is stored in a local variable that cannot be
    // accessed from window, document, or the browser console.
    // ============================================================
    (function() {
      'use strict';

      const WORKER_URL = 'https://apk-upload-proxy.abhishrestha987.workers.dev';

      // Closure-scoped passcode. Inaccessible from DevTools console.
      let _verifiedPasscode = '';

      // ---- LOCK SCREEN LOGIC ----
      const passcodeInput = document.getElementById('passcodeInput');
      const lockError = document.getElementById('lockError');
      const unlockBtn = document.getElementById('unlockBtn');

      // Allow Enter key to submit
      passcodeInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') window.__unlock();
      });

      // Expose unlock to onclick but keep passcode in closure
      window.__unlock = async function() {
        const code = passcodeInput.value.trim();
        if (!code) {
          showLockError('Please enter a passcode');
          return;
        }

        unlockBtn.disabled = true;
        unlockBtn.textContent = 'Verifying...';
        lockError.textContent = '';
        passcodeInput.classList.remove('error');

        try {
          const res = await fetch(WORKER_URL, {
            method: 'POST',
            headers: {
              'X-Action': 'verify-passcode',
              'Content-Type': 'application/json',
              'X-Passcode': code
            },
            body: JSON.stringify({})
          });

          if (res.ok) {
            // Store passcode in closure (not on window!)
            _verifiedPasscode = code;

            // Animate lock screen away
            const lockScreen = document.getElementById('lockScreen');
            lockScreen.classList.add('unlocked');

            // After animation, remove lock and inject upload UI
            setTimeout(function() {
              lockScreen.remove();
              injectUploadUI();
            }, 400);
          } else {
            const data = await res.json().catch(function() { return {}; });
            showLockError(data.error || 'Incorrect Passcode');
            passcodeInput.classList.add('error');
            passcodeInput.focus();
            passcodeInput.select();
          }
        } catch (err) {
          showLockError('Connection error. Please try again.');
        }

        unlockBtn.disabled = false;
        unlockBtn.textContent = 'Unlock';
      };

      function showLockError(msg) {
        lockError.textContent = msg;
        passcodeInput.classList.add('error');
        setTimeout(function() { passcodeInput.classList.remove('error'); }, 600);
      }

      // ---- DYNAMIC UPLOAD UI INJECTION ----
      // The upload UI markup is created here in JS. It does NOT exist
      // in the HTML source at all, preventing DOM inspection bypass.
      function injectUploadUI() {
        const rightSection = document.getElementById('rightSection');

        const card = document.createElement('div');
        card.className = 'upload-card';
        card.innerHTML = `
          <div class="card-header">
            <h2>Upload APK</h2>
          </div>

          <div class="drop-zone" id="dropZone">
            <input type="file" id="fileInput" accept=".apk">
            <span class="drop-icon">📦</span>
            <div class="drop-text">Drag & drop your APK</div>
            <p class="drop-hint">or click to browse</p>
            <div class="file-info" id="fileInfo"></div>
          </div>

          <div class="progress-bar" id="progressBar">
            <div class="progress-fill"></div>
          </div>

          <div class="progress-text" id="progressText">0%</div>

          <div class="stepper" id="stepper">
            <div class="step" id="step1">
              <div class="step-icon">1</div>
              <div>Upload</div>
            </div>
            <div class="step" id="step2">
              <div class="step-icon">2</div>
              <div>Process</div>
            </div>
            <div class="step" id="step3">
              <div class="step-icon">3</div>
              <div>Signing</div>
            </div>
            <div class="step" id="step4">
              <div class="step-icon">4</div>
              <div>Ready</div>
            </div>
          </div>

          <div class="status" id="status"></div>

          <button class="download-btn" id="downloadBtn">
            ⬇️ Download Signed APK
          </button>
        `;

        rightSection.appendChild(card);
        initUploadLogic();
      }

      // ---- UPLOAD LOGIC (runs only after injection) ----
      function initUploadLogic() {
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const statusEl = document.getElementById('status');
        const downloadBtn = document.getElementById('downloadBtn');
        const progressBar = document.getElementById('progressBar');
        const progressFill = progressBar.querySelector('.progress-fill');
        const progressText = document.getElementById('progressText');
        const fileInfo = document.getElementById('fileInfo');
        const stepper = document.getElementById('stepper');

        function setStep(stepNumber) {
          for (let i = 1; i <= 4; i++) {
            const stepEl = document.getElementById('step' + i);
            const iconEl = stepEl.querySelector('.step-icon');
            stepEl.classList.remove('error');

            if (i < stepNumber) {
              stepEl.className = 'step completed';
              iconEl.innerHTML = '✓';
            } else if (i === stepNumber) {
              stepEl.className = 'step active';
              iconEl.innerHTML = '<span class="spinner-small"></span>';
            } else {
              stepEl.className = 'step';
              iconEl.innerHTML = i;
            }
          }
        }

        function setStepError() {
          const activeStep = document.querySelector('.step.active');
          if (activeStep) {
            activeStep.className = 'step error';
            activeStep.querySelector('.step-icon').innerHTML = '✗';
          }
        }

        dropZone.addEventListener('click', function() { fileInput.click(); });
        dropZone.addEventListener('dragover', function(e) { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', function() { dropZone.classList.remove('dragover'); });
        dropZone.addEventListener('drop', function(e) {
          e.preventDefault();
          dropZone.classList.remove('dragover');
          handleFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', function() { handleFile(fileInput.files[0]); });

        async function handleFile(file) {
          if (!file || !file.name.endsWith('.apk')) {
            showStatus('Please select a valid APK file', 'error');
            return;
          }

          var FILENAME_REGEX = /^[a-zA-Z0-9._\-]+\.apk$/;
          if (!FILENAME_REGEX.test(file.name)) {
            showStatus('Invalid filename. Only letters, numbers, dots, dashes, and underscores are allowed (no spaces).', 'error');
            return;
          }

          // Validate magic bytes (ZIP signature: PK\x03\x04)
          var headerBuf = await file.slice(0, 4).arrayBuffer();
          var headerView = new Uint8Array(headerBuf);
          if (headerView.length < 4 || headerView[0] !== 0x50 || headerView[1] !== 0x4B || headerView[2] !== 0x03 || headerView[3] !== 0x04) {
            showStatus('File does not appear to be a valid APK (invalid ZIP signature)', 'error');
            return;
          }

          var fileSizeMB = (file.size / 1024 / 1024).toFixed(1);
          fileInfo.textContent = file.name + ' (' + fileSizeMB + ' MB)';
          fileInfo.classList.add('visible');

          downloadBtn.classList.remove('visible');
          progressBar.classList.add('visible');
          progressText.classList.add('visible');
          stepper.classList.add('visible');
          progressFill.style.width = '0%';
          progressText.textContent = '0%';

          try {
            setStep(1);
            showStatus('Creating release...', 'loading');

            var release = await workerFetch('create-release', 'POST',
              { tag_name: 'signing-' + Date.now(), name: 'Signing Job', draft: true }
            );
            if (!release.id) throw new Error('Failed to create release: ' + JSON.stringify(release));

            showStatus('Uploading APK (' + fileSizeMB + ' MB)...', 'loading');

            var asset = await uploadWithProgress(
              WORKER_URL + '?release_id=' + release.id + '&file_name=' + encodeURIComponent(file.name),
              file
            );
            if (!asset.id) throw new Error('Asset upload failed: ' + JSON.stringify(asset));

            setStep(2);
            showStatus('Triggering signing workflow...', 'loading');

            await workerFetch('trigger-workflow', 'POST', {
              apk_url: asset.url,
              file_name: file.name,
              release_id: String(release.id)
            });

            setStep(3);
            showStatus('Signing in progress...', 'loading');

            await pollForResult(release.id, file.name);

          } catch (err) {
            progressBar.classList.remove('visible');
            progressText.classList.remove('visible');
            setStepError();
            showStatus(err.message, 'error');
          }
        }

        async function pollForResult(releaseId, originalName) {
          var signedName = originalName.replace(/\.apk$/i, '_signed.apk');
          var maxAttempts = 120;
          var attempts = 0;

          return new Promise(function(resolve, reject) {
            var interval = setInterval(async function() {
              attempts++;
              if (attempts > maxAttempts) {
                clearInterval(interval);
                progressBar.classList.remove('visible');
                progressText.classList.remove('visible');
                reject(new Error('Timed out after 2 minutes. Check GitHub Actions for errors.'));
                return;
              }
              try {
                var assets = await workerFetch('poll-assets&release_id=' + releaseId, 'GET');
                var signed = assets.find(function(a) { return a.name === signedName; });
                if (signed) {
                  clearInterval(interval);
                  progressBar.classList.remove('visible');
                  progressText.classList.remove('visible');
                  setStep(5);
                  showStatus('Signing complete! Ready to download.', 'success');

                  // SECURITY: Download via fetch + Blob so passcode stays in headers only
                  downloadBtn.onclick = async function() {
                    downloadBtn.disabled = true;
                    downloadBtn.textContent = '⏳ Downloading...';
                    try {
                      var dlRes = await fetch(WORKER_URL + '?action=download-asset&asset_url=' + encodeURIComponent(signed.url), {
                        headers: { 'X-Passcode': _verifiedPasscode }
                      });
                      if (!dlRes.ok) throw new Error('Download failed');
                      var blob = await dlRes.blob();
                      var blobUrl = URL.createObjectURL(blob);
                      var tempLink = document.createElement('a');
                      tempLink.href = blobUrl;
                      tempLink.download = signedName;
                      tempLink.click();
                      URL.revokeObjectURL(blobUrl);
                    } catch (err) {
                      showStatus('Download failed: ' + err.message, 'error');
                    }
                    downloadBtn.disabled = false;
                    downloadBtn.textContent = '⬇️ Download Signed APK';
                  };

                  downloadBtn.classList.add('visible');
                  resolve();
                }
              } catch (e) { /* keep polling */ }
            }, 1000);
          });
        }

        // Uses the closure-scoped _verifiedPasscode
        function workerFetch(action, method, body) {
          var opts = {
            method: method || 'GET',
            headers: { 'X-Action': action, 'Content-Type': 'application/json', 'X-Passcode': _verifiedPasscode }
          };
          if (body) opts.body = JSON.stringify(body);
          return fetch(WORKER_URL, opts).then(function(r) {
            return r.json().then(function(json) {
              if (!r.ok) throw new Error(json.error || 'HTTP ' + r.status);
              return json;
            });
          });
        }

        function uploadWithProgress(url, file) {
          return new Promise(function(resolve, reject) {
            var xhr = new XMLHttpRequest();

            xhr.upload.addEventListener('progress', function(e) {
              if (e.lengthComputable) {
                var progress = Math.round((e.loaded / e.total) * 100);
                progressFill.style.width = progress + '%';
                progressText.textContent = progress + '%';
              }
            });

            xhr.addEventListener('load', function() {
              if (xhr.status >= 200 && xhr.status < 300) {
                try {
                  resolve(JSON.parse(xhr.responseText));
                } catch (e) {
                  reject(new Error('Failed to parse upload response'));
                }
              } else {
                reject(new Error('Upload failed with status ' + xhr.status));
              }
            });

            xhr.addEventListener('error', function() { reject(new Error('Upload error')); });
            xhr.addEventListener('abort', function() { reject(new Error('Upload cancelled')); });

            xhr.open('POST', url);
            xhr.setRequestHeader('X-Action', 'upload-asset');
            xhr.setRequestHeader('X-Passcode', _verifiedPasscode);
            xhr.send(file);
          });
        }

        function showStatus(msg, type) {
          type = type || 'loading';
          statusEl.innerHTML = '';
          var icon = '';
          if (type === 'loading') {
            var spinner = document.createElement('span');
            spinner.className = 'spinner';
            statusEl.appendChild(spinner);
          } else if (type === 'error') {
            icon = '⚠️';
          } else if (type === 'success') {
            icon = '✅';
          }
          var textNode = document.createTextNode((icon ? icon + ' ' : '') + msg);
          statusEl.appendChild(textNode);
          statusEl.className = 'status visible ' + type;
        }
      }
    })();
  </script>
</body>
