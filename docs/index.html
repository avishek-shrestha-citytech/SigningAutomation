<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Citytech APK Signing Service</title>
  <link rel="icon" type="image/x-icon" href="CityTech.ico">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="main">
    <div class="left-section">
      <div class="logo-section">
        <img src="CityTech.ico" alt="CityTech" class="logo-img">
        <div class="logo-text">
          <h2>Citytech</h2>
          <p>APK Signing Service</p>
        </div>
      </div>
    </div>

    <div class="right-section" id="rightSection">
      <div class="lock-card" id="lockScreen">
        <span class="lock-icon">🔒</span>
        <h2>Authorized Access Only</h2>
        <p class="lock-subtitle">Enter your organization passcode to continue</p>
        <div class="passcode-group">
          <input type="password" id="passcodeInput" class="passcode-input" placeholder="Enter Passcode"
            autocomplete="off">
          <button class="unlock-btn" id="unlockBtn" onclick="window.__unlock()">Unlock</button>
        </div>
        <div class="lock-error-msg" id="lockError"></div>
      </div>
    </div>
  </div>

  <footer>
    <span class="credit">By Avishek Shrestha | CityTech</span>
  </footer>

  <script src="app.js"></script>
</body>

</html>
